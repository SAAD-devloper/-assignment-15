<!DOCTYPE html>
<html>
<head>
    <title>Registration- Form</title>
</head>
<body>
    <table border="2">
            <tr>
        <center>
            <hr>
          <a href="index.html">1</a>
          <a href="2.html">2</a>
          <a href="3.html">3</a>
          <a href="4.html">4</a>
          <a href="5.html">5</a>
    
            <hr>
        </center>
            </tr>
            
            
        </table>

    <table align="center" width="500" border="0">
        <tr>
            <td align="center">
                <font color="red" size="4"><b>REGISTRATION</b></font>
                <br><br>
            </td>
        </tr>
        <tr>
            <td>
                <form>
                    <table width="100%" border="0" cellpadding="5">
                        <tr>
                            <td width="35%"><label for="name">Name :</label></td>
                            <td><input type="text" id="name" name="name" size="30"></td>
                        </tr>
                        
                        <tr>
                            <td><label for="password">Password :</label></td>
                            <td><input type="password" id="password" name="password" size="30"></td>
                        </tr>
                        
                        <tr>
                            <td><label for="email">E-Mail :</label></td>
                            <td><input type="text" id="email" name="email" size="30"></td>
                        </tr>
                        
                        <tr>
                            <td><label for="phone">Phone No :</label></td>
                            <td><input type="text" id="phone" name="phone" size="30"></td>
                        </tr>
                        
                        <tr>
                            <td>Sex :</td>
                            <td>
                                <input type="radio" id="male" name="sex" value="male">
                                <label for="male">Male</label>
                                <input type="radio" id="female" name="sex" value="female">
                                <label for="female">Female</label>
                            </td>
                        </tr>
                        
                        <tr>
                            <td>D.O.B:</td>
                            <td>
                                <select name="day">
                                    <option value="1">1</option>
                                </select>
                                <select name="month">
                                    <option value="1">1</option>
                                </select>
                                <select name="year">
                                    <option value="1990">1990</option>
                                </select>
                            </td>
                        </tr>
                        
                        <tr>
                            <td>Languages Known :</td>
                            <td>
                                <input type="checkbox" id="telugu" name="lang" value="telugu"> <label for="telugu">Telugu</label>
                                <input type="checkbox" id="english" name="lang" value="english"> <label for="english">English</label>
                                <input type="checkbox" id="tamil" name="lang" value="tamil"> <label for="tamil">Tamil</label>
                                <input type="checkbox" id="hindi" name="lang" value="hindi"> <label for="hindi">Hindi</label>
                            </td>
                        </tr>
                        
                        <tr>
                            <td valign="top"><label for="address">Address :</label></td>
                            <td>
                                <textarea id="address" name="address" rows="5" cols="28"></textarea>
                            </td>
                        </tr>
                        
                        <tr>
                            <td colspan="2" align="center">
                                <br>
                                <input type="submit" value="Submit">
                                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                                <input type="reset" value="Reset">
                            </td>
                        </tr>
                    </table>
                </form>
            </td>
        </tr>
    </table>

</body>
</html>
